<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitebell Studio - Universal Pet Widget</title>
    
    <style>
        /* Base styling agar background transparan */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
        }

        /* DASHBOARD SETUP */
        #dashboard-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 999;
            background: rgba(255, 240, 245, 0.95); /* Tema Pastel Pink Whitebell */
            border: 2px solid #e0b0ff; /* Lavender */
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-width: 320px;
        }
        #dashboard-ui h3 { margin-top: 0; color: #7b1fa2; }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: 0.2s;
        }
        .btn-test { background: #e0b0ff; color: #4a0072; }
        .btn-test:hover { background: #d291ff; }

        /* RAGA PET */
        #pet-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px; 
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; 
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- Dashboard ini hanya akan hilang jika benar-benar dibuka di dalam Software OBS / TikTok Live Studio -->
    <div id="dashboard-ui">
        <h3>🦋 Whitebell Setup</h3>
        <p style="font-size: 12px; color: #555;">Gunakan panel di bawah ini untuk mengetes gerakan pet kupu-kupu secara langsung.</p>
        
        <div style="font-size: 11px; margin: 10px 0; color: #666; word-break: break-all;">
            <strong>Link Kamu:</strong><br>
            <code style="background:#eee; padding:2px; display:block; margin-top:3px;">https://pet-companion-bay.vercel.app/?token=meong123</code>
        </div>

        <hr style="border: 0; border-top: 1px solid #e0b0ff; margin: 15px 0;">
        
        <p style="font-size: 11px; font-weight: bold; margin: 0; color: #7b1fa2;">🎯 PANEL SIMULASI (TES ANIMASI):</p>
        <button class="btn btn-test" onclick="runTest('follow')">❤️ Test Follow (Video Subscribe)</button>
        <button class="btn btn-test" onclick="runTest('gift')">🪙 Test Gift (Video Gift)</button>
        <button class="btn btn-test" onclick="runTest('subscribe')">⭐ Test Subscribe (Video Surprise)</button>
    </div>

    <div id="pet-container" onclick="triggerClick()">
        <video id="pet-video" autoplay loop muted playsinline>
            <source id="video-source" src="idle.webm" type="video/webm">
        </video>
    </div>

    <script>
        const petVideo = document.getElementById('pet-video');
        const sourceElement = document.getElementById('video-source');
        const dashboard = document.getElementById('dashboard-ui');

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const anim = urlParams.get('anim');

        // 1. KEAMANAN MULTI-TOKEN (Daftar lisensi pembeli Whitebell Studio)
        const validTokens = ['meong123', 'WB001', 'WB002', 'WB003']; 
        if (!validTokens.includes(token)) {
            document.body.innerHTML = "<h2 style='color:white; text-align:center; margin-top:20%;'>Akses Ditolak: Token Whitebell Invalid!</h2>"; 
        }

        // 2. DETEKSI OBS SEJATI (Hanya menyembunyikan dashboard jika dibuka lewat OBS Studio asli)
        if (window.obsStudio) {
            dashboard.style.display = 'none';
        }

        // Fungsi utama memutar file animasi webm
        function playAnim(file) {
            petVideo.src = file;
            petVideo.play();
        }

        // 3. LOGIKA INDOFINITY (Membaca parameter URL &anim=)
        if (anim) {
            // Dashboard otomatis hilang kalau link ini dipanggil oleh Indofinity untuk alert
            dashboard.style.display = 'none'; 

            if (anim === 'follow') {
                playAnim('subscribe.webm'); // Follow memutar subscribe.webm sesuai request
            } else if (anim === 'gift') {
                playAnim('gift.webm');      // Gift memutar gift.webm
            } else if (anim === 'subscribe') {
                playAnim('surprise.webm');  // Subscribe memutar surprise.webm sesuai request
            }
        }

        // 4. FITUR KLIK MANUAL
        function triggerClick() {
            playAnim('click.webm');
            setTimeout(() => { window.location.reload(); }, 3000); // Reset ke idle setelah 3 detik
        }

        // Fungsi bantu untuk tombol simulasi di dashboard
        function runTest(type) {
            const currentToken = token || 'meong123';
            window.location.href = `?token=${currentToken}&anim=${type}`;
        }
    </script>
</body>
</html>
